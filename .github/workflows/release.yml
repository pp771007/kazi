name: Release APK

# 推 v* 標籤就會自動 build debug APK 並掛到 GitHub Release。
# 例如：git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 也允許手動觸發（從 Actions 頁面按 Run）

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要才能 create release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 本機的 gradle-wrapper.properties 指向公司網路擋下載而 bundle 的 file:// 路徑，
      # CI 上沒有這個檔案，要改回公開的 distribution URL。
      - name: Patch gradle-wrapper distribution URL
        run: |
          sed -i 's|distributionUrl=file.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.11.1-bin.zip|' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties

      # gradle.properties 寫死本機 Android Studio 的 JBR 路徑（Windows-only），CI 用不了
      - name: Strip local-only org.gradle.java.home from gradle.properties
        run: |
          sed -i '/^org\.gradle\.java\.home=/d' gradle.properties
          cat gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Windows commit 上來的 gradlew 沒有 exec bit，Linux runner 跑不動
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Resolve version name from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KAZI_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/kazi-release.jks"
          test -s "$RUNNER_TEMP/kazi-release.jks"
          echo "KAZI_KEYSTORE_FILE=$RUNNER_TEMP/kazi-release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          KAZI_KEYSTORE_PASSWORD: ${{ secrets.KAZI_KEYSTORE_PASSWORD }}
          KAZI_KEY_ALIAS:         ${{ secrets.KAZI_KEY_ALIAS }}
          KAZI_KEY_PASSWORD:      ${{ secrets.KAZI_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -PversionName=${{ steps.version.outputs.version }} --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk kazi-${{ steps.version.outputs.version }}.apk
          ls -lh kazi-*.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kazi-${{ steps.version.outputs.version }}
          path: kazi-*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: kazi-*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
